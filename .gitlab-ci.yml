image: docker:24

services:
  - docker:24-dind

stages:
  - test
  - build
  - release

variables:
  # Use overlay2 for better performance
  DOCKER_DRIVER: overlay2
  # Standard TLS location for Docker-in-Docker
  DOCKER_TLS_CERTDIR: "/certs"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH'

install_deps:
  stage: test
  image: node:24
  # Cache node_modules to speed up subsequent runs
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci

# Job to verify multi-arch build succeeds (Dry Run)
build_image:
  stage: build
  script:
    # Build for x86 and save to file for next step
    # Note: Add --build-arg AUTH_URL=$AUTH_URL if your Dockerfile requires it
    - docker buildx build --platform linux/amd64 -t temp-image --load .
    - docker save -o image.tar temp-image
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day

# Manual job to build and push to registry
push_dev_image:
  stage: build
  when: manual
  dependencies:
    - build_image
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker load -i image.tar
    # Tag format: dev-a1b2c3d
    - TAG="dev-$CI_COMMIT_SHORT_SHA"
    - echo "Pushing $CI_REGISTRY_IMAGE:$TAG"
    - docker tag temp-image "$CI_REGISTRY_IMAGE:$TAG"
    - docker push "$CI_REGISTRY_IMAGE:$TAG"

semantic_release:
  stage: release
  image: node:24
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - npx semantic-release
  variables:
    GITLAB_TOKEN: $GITLAB_TOKEN